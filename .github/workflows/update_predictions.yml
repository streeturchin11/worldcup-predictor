# update_predictions.yml
#
# What it does:
#   1. Re-fetches data/intl_results.csv from martj42/international_results
#   2. Runs scripts/sync_wc_results.py — writes any played WC matches from
#      the CSV into data/wc_results.json (replaces manual entry)
#   3. Fits the Poisson model and runs 10,000 simulations via export_json.py
#   4. Commits and pushes wc_results.json and predictions.json if either changed
#
# Triggers:
#   - Daily at 07:00 UTC (catches overnight + early morning results)
#   - Manual: GitHub UI → Actions → "Update predictions" → Run workflow

name: Update predictions

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas numpy scipy flask

      - name: Re-fetch historical results CSV
        run: |
          curl -sSf -o data/intl_results.csv \
            https://raw.githubusercontent.com/martj42/international_results/master/results.csv
          echo "Rows: $(wc -l < data/intl_results.csv)"

      - name: Sync WC match results from CSV
        run: python3 scripts/sync_wc_results.py

      - name: Generate predictions
        run: python3 scripts/export_json.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/wc_results.json docs/predictions.json

          if git diff --cached --quiet; then
            echo "Nothing changed — no commit needed."
            exit 0
          fi

          git fetch origin main
          git rebase --autostash origin/main

          git add data/wc_results.json docs/predictions.json
          git commit -m "chore: update predictions [skip ci]"
          git push origin HEAD:main
